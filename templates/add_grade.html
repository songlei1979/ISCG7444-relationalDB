{% extends "base.html" %}

{% block title %}Add Grade - Student Grades System{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <h2>Add New Grade</h2>
        <form method="POST">
            <div class="mb-3">
                <label for="student_id" class="form-label">Student</label>
                <select class="form-control" id="student_id" name="student_id" required>
                    <option value="">Select a student</option>
                    {% for student in students %}
                    <option value="{{ student.student_id }}">{{ student.last_name }}, {{ student.first_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label for="course_id" class="form-label">Course</label>
                <select class="form-control" id="course_id" name="course_id" required>
                    <option value="">Select a course</option>
                    {% for course in courses %}
                    <option value="{{ course.course_id }}">{{ course.course_code }} - {{ course.course_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label for="grade" class="form-label">Grade (%)</label>
                <input type="number" class="form-control" id="grade" name="grade" min="0" max="100" step="0.1" required>
            </div>
            <div class="mb-3">
                <label for="semester" class="form-label">Semester</label>
                <select class="form-control" id="semester" name="semester" required>
                    <option value="">Select semester</option>
                    <option value="Fall">Fall</option>
                    <option value="Spring">Spring</option>
                    <option value="Summer">Summer</option>
                    <option value="Winter">Winter</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="year" class="form-label">Year</label>
                <input type="number" class="form-control" id="year" name="year" min="2020" max="2030" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Add Grade</button>
                <a href="{{ url_for('grades') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
